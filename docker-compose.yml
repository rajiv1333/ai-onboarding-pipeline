# docker-compose.yml
# -------------------------------------------------------------------
# Local development environment.
# Starts: PostgreSQL, Redis, the FastAPI gateway, and the workers.
# Does NOT replicate AWS-specific services (SQS, S3, Secrets Manager).
# In local dev the app falls back to Redis queues + local file storage.
# -------------------------------------------------------------------

version: "3.9"

services:

  # ── Infrastructure ─────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: onboarding
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Migrations (runs once, then exits) ─────────────────────────

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_MODE: migrate
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/onboarding
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── API Gateway ─────────────────────────────────────────────────

  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_MODE: api
      PORT: "8000"
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/onboarding
      REDIS_URL: redis://redis:6379
      # Override storage to use local folder in dev
      STORAGE_BACKEND: local
      STORAGE_LOCAL_PATH: /app/uploads
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app          # hot-reload: mount source for local changes
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # ── Workers ─────────────────────────────────────────────────────

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_MODE: worker
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/onboarding
      REDIS_URL: redis://redis:6379
      STORAGE_BACKEND: local
      STORAGE_LOCAL_PATH: /app/uploads
    env_file: .env
    volumes:
      - ./app:/app/app
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
  uploads:

# ── Usage ──────────────────────────────────────────────────────────
#
# Start everything:
#   docker compose up
#
# Start only infrastructure (run API/worker locally for hot-reload):
#   docker compose up postgres redis
#
# Run migrations only:
#   docker compose run --rm migrate
#
# Rebuild after requirements.txt changes:
#   docker compose build
#
# Reset all data (drops postgres volume):
#   docker compose down -v
